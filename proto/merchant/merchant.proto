syntax = "proto3";

package merchant;

option go_package = "github.com/kainguyen/goodie-api/proto/merchant";

import "google/protobuf/timestamp.proto";

service MerchantService {
  rpc GetStoreInfo(GetStoreInfoRequest) returns (StoreResponse);
  rpc GetStoresByMerchant(GetStoresByMerchantRequest) returns (StoreListResponse);
  rpc GetMenuItems(GetMenuItemsRequest) returns (MenuItemListResponse);
  rpc GetMenuItemByID(GetMenuItemByIDRequest) returns (MenuItemResponse);
  rpc UpdateOrderStatus(UpdateMerchantOrderStatusRequest) returns (UpdateMerchantOrderStatusResponse);
}

message GetStoreInfoRequest {
  string store_id = 1;
}

message GetStoresByMerchantRequest {
  string merchant_id = 1;
}

message GetMenuItemsRequest {
  string store_id = 1;
  string category_id = 2; // optional filter
}

message GetMenuItemByIDRequest {
  string item_id = 1;
}

message UpdateMerchantOrderStatusRequest {
  string order_id = 1;
  string status = 2;
}

message UpdateMerchantOrderStatusResponse {
  bool success = 1;
}

message StoreResponse {
  string id = 1;
  string merchant_id = 2;
  string name = 3;
  string address = 4;
  double lat = 5;
  double lng = 6;
  string phone = 7;
  string image_url = 8;
  string opening_hours = 9; // JSON string
  bool is_active = 10;
  double avg_rating = 11;
  int32 total_reviews = 12;
  double commission_rate = 13;
  google.protobuf.Timestamp created_at = 14;
}

message StoreListResponse {
  repeated StoreResponse stores = 1;
}

message MenuItemResponse {
  string id = 1;
  string store_id = 2;
  string name = 3;
  string description = 4;
  double price = 5;
  string image_url = 6;
  string category_id = 7;
  bool is_available = 8;
  int32 sort_order = 9;
  repeated ItemOptionResponse options = 10;
}

message ItemOptionResponse {
  string id = 1;
  string name = 2;
  double price_extra = 3;
  bool is_required = 4;
  int32 max_select = 5;
}

message MenuItemListResponse {
  repeated MenuItemResponse items = 1;
}
