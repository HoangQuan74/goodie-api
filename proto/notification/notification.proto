syntax = "proto3";

package notification;

option go_package = "github.com/HoangQuan74/goodie-api/proto/notification";

import "google/protobuf/timestamp.proto";

service NotificationService {
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
  rpc GetNotifications(GetNotificationsRequest) returns (NotificationListResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse);
}

message SendNotificationRequest {
  string user_id = 1;
  string type = 2; // ORDER_STATUS, PROMOTION, SYSTEM
  string title = 3;
  string body = 4;
  map<string, string> data = 5;
}

message SendNotificationResponse {
  bool success = 1;
  string notification_id = 2;
}

message GetNotificationsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 per_page = 3;
  bool unread_only = 4;
}

message MarkAsReadRequest {
  repeated string notification_ids = 1;
}

message MarkAsReadResponse {
  bool success = 1;
}

message NotificationResponse {
  string id = 1;
  string user_id = 2;
  string type = 3;
  string title = 4;
  string body = 5;
  map<string, string> data = 6;
  bool is_read = 7;
  google.protobuf.Timestamp created_at = 8;
}

message NotificationListResponse {
  repeated NotificationResponse notifications = 1;
  int64 total = 2;
}
