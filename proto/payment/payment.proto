syntax = "proto3";

package payment;

option go_package = "github.com/kainguyen/goodie-api/proto/payment";

import "google/protobuf/timestamp.proto";

service PaymentService {
  rpc ProcessPayment(ProcessPaymentRequest) returns (PaymentResponse);
  rpc GetPaymentByOrder(GetPaymentByOrderRequest) returns (PaymentResponse);
  rpc RefundPayment(RefundPaymentRequest) returns (PaymentResponse);
  rpc GetPaymentHistory(GetPaymentHistoryRequest) returns (PaymentListResponse);
}

message ProcessPaymentRequest {
  string order_id = 1;
  string user_id = 2;
  double amount = 3;
  string method = 4; // cod, ewallet, credit_card
  string idempotency_key = 5;
}

message GetPaymentByOrderRequest {
  string order_id = 1;
}

message RefundPaymentRequest {
  string payment_id = 1;
  string reason = 2;
}

message GetPaymentHistoryRequest {
  string user_id = 1;
  int32 page = 2;
  int32 per_page = 3;
}

message PaymentResponse {
  string id = 1;
  string order_id = 2;
  double amount = 3;
  string method = 4;
  string status = 5; // pending, completed, failed, refunded
  string transaction_id = 6;
  google.protobuf.Timestamp paid_at = 7;
  google.protobuf.Timestamp created_at = 8;
}

message PaymentListResponse {
  repeated PaymentResponse payments = 1;
  int64 total = 2;
}
