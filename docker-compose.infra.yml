version: "3.9"

services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: goodie-postgres
    environment:
      POSTGRES_USER: goodie
      POSTGRES_PASSWORD: goodie_secret
      POSTGRES_DB: goodie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goodie"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - goodie-network

  # ==================== MongoDB ====================
  mongodb:
    image: mongo:7
    container_name: goodie-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: goodie
      MONGO_INITDB_ROOT_PASSWORD: goodie_secret
      MONGO_INITDB_DATABASE: goodie
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goodie-network

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: goodie-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - goodie-network

  # ==================== Kafka (KRaft mode, no Zookeeper) ====================
  kafka:
    image: bitnami/kafka:3.7
    container_name: goodie-kafka
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - goodie-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: goodie-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: goodie-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    networks:
      - goodie-network

  kafka-init:
    image: bitnami/kafka:3.7
    container_name: goodie-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        topics=(
          "order.created:3:1"
          "order.confirmed:3:1"
          "order.preparing:3:1"
          "order.ready:3:1"
          "order.picked_up:3:1"
          "order.delivered:3:1"
          "order.cancelled:3:1"
          "payment.initiated:3:1"
          "payment.completed:3:1"
          "payment.failed:3:1"
          "merchant.updated:3:1"
          "menu.updated:3:1"
          "review.created:3:1"
          "notification.send:3:1"
          "driver.location:6:1"
          "service.logs:3:1"
        )
        for topic_config in "$${topics[@]}"; do
          IFS=':' read -r topic partitions replication <<< "$$topic_config"
          kafka-topics.sh --create \
            --bootstrap-server kafka:9092 \
            --topic "$$topic" \
            --partitions "$$partitions" \
            --replication-factor "$$replication" \
            --if-not-exists
          echo "Created topic: $$topic"
        done
        echo "All topics created!"
    networks:
      - goodie-network

  # ==================== Elasticsearch ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: goodie-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - goodie-network

  # ==================== Logstash ====================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: goodie-logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./configs/logstash/pipeline.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5044:5044"
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    networks:
      - goodie-network

  # ==================== Kibana ====================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: goodie-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    healthcheck:
      test: curl -s http://localhost:5601/api/status | grep -q '"overall":{"level":"available"'
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - goodie-network

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
  es_data:

networks:
  goodie-network:
    driver: bridge
